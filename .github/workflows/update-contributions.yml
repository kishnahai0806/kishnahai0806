name: Update Contribution Heatmap

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate contribution heatmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: kishnahai0806
        run: python scripts/generate_contrib_heatmap.py

      - name: Commit updated heatmap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add contrib-heatmap.svg

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update contribution heatmap"
            git push
          fi
