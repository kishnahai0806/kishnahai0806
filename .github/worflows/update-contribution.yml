name: Update Contribution Heatmap

on:
  schedule:
    # Runs every day at 3:00 UTC
    - cron: "0 3 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: kishnahai0806
        run: |
          python scripts/generate_contrib_heatmap.py

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add contrib-heatmap.svg

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update contribution heatmap"
            git push
          fi
