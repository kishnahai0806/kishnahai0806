<svg xmlns="http://www.w3.org/2000/svg" width="900" height="690" viewBox="0 0 900 690" role="img" aria-labelledby="title desc">
<title id="title">Krish Prajapati terminal dashboard</title>
<desc id="desc">A compact terminal-style dashboard showing Krish Prajapati’s backend engineering profile, skills, tools, and projects.</desc>
<style>

  .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
  .titlebar { fill: #161b22; }
  .divider { stroke: #30363d; stroke-width: 1; }

  text {
    font-family: Consolas, Monaco, "Liberation Mono", "Courier New", monospace;
    font-size: 15px;
    dominant-baseline: middle;
  }

  .window-title { fill: #f0f6fc; font-size: 15px; font-weight: 700; }
  .prompt { fill: #39d353; font-weight: 700; }
  .logo { fill: #39d353; font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .label { fill: #58a6ff; font-weight: 700; }
  .value { fill: #c9d1d9; }
  .tree { fill: #c9d1d9; }
  .folder { fill: #58a6ff; font-weight: 700; }
  .project { fill: #d2a8ff; font-weight: 700; }

  .reveal {
    opacity: 1;
    animation: reveal 0.28s ease-out both;
  }

  .cursor {
    fill: #39d353;
    animation: blink 1s steps(1, end) infinite;
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; }
    .cursor { animation: none; }
  }

</style>
