<svg xmlns="http://www.w3.org/2000/svg" width="900" height="860" viewBox="0 0 900 860" role="img" aria-labelledby="title desc">
<title id="title">Krish Prajapati terminal dashboard</title>
<desc id="desc">A terminal-style dashboard showing Krish Prajapati’s software engineering profile, skills, tools, and projects.</desc>
<style>

  .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
  .titlebar { fill: #161b22; }
  .divider { stroke: #30363d; stroke-width: 1; }
  text {
    font-family: Consolas, Monaco, "Liberation Mono", "Courier New", monospace;
    font-size: 16px;
    dominant-baseline: middle;
  }
  .window-title { fill: #f0f6fc; font-size: 16px; font-weight: 700; }
  .prompt { fill: #39d353; font-weight: 700; }
  .logo { fill: #39d353; font-size: 26px; font-weight: 700; letter-spacing: 1px; }
  .label { fill: #58a6ff; font-weight: 700; }
  .value { fill: #c9d1d9; }
  .tree { fill: #c9d1d9; }
  .folder { fill: #58a6ff; font-weight: 700; }
  .project { fill: #d2a8ff; font-weight: 700; }
  .muted { fill: #8b949e; font-size: 14px; }

  .reveal {
    opacity: 1;
    animation: reveal 0.35s ease-out both;
  }

  @keyframes reveal {
    0% { opacity: 0; transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; }
  }

</style>
