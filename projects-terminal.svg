<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="900" height="550" viewBox="0 0 900 550" role="img" aria-labelledby="title desc">
<title id="title">Krish Prajapati featured projects</title>
<desc id="desc">A terminal-style list of four featured software projects with links, technology stacks, descriptions, and statuses.</desc>
<style>

  .bg { fill: #0d1117; stroke: #30363d; stroke-width: 2; }
  .titlebar { fill: #161b22; }
  .divider { stroke: #30363d; stroke-width: 1; }

  text {
    font-family: Consolas, Monaco, "Liberation Mono", "Courier New", monospace;
    dominant-baseline: middle;
  }

  .window-title { fill: #f0f6fc; font-size: 15px; font-weight: 700; }
  .prompt { fill: #39d353; font-size: 15px; font-weight: 700; }
  .name { fill: #58a6ff; font-size: 17px; font-weight: 700; }
  .tree { fill: #c9d1d9; font-size: 14px; }
  .label { fill: #8b949e; }
  .ready { fill: #39d353; }
  .live { fill: #39d353; }
  .completed { fill: #39d353; }

  .row {
    opacity: 0;
    animation: reveal 0.35s ease-out both;
  }

  .cursor {
    fill: #39d353;
    animation: blink 1s steps(1, end) infinite;
  }

  a:hover .name {
    fill: #79c0ff;
    text-decoration: underline;
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes blink {
    0%, 45% { opacity: 1; }
    46%, 100% { opacity: 0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .row { opacity: 1; animation: none; }
    .cursor { animation: none; }
  }

</style>
<rect class="bg" x="1" y="1" width="898" height="548" rx="14"/>
